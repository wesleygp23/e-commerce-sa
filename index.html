<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Simples</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Cabeçalho -->
  <header>
    <h1>Minha Loja</h1>
    <nav aria-label="Menu principal">
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <section class="produtos">
      <h2>Produtos em destaque</h2>

      <div class="grid">

        <!-- Produto 1 -->
        <article class="produto">
          <img src="https://via.placeholder.com/200" alt="Camiseta básica preta">
          <h3>Camiseta Preta</h3>
          <p>Camiseta confortável de algodão.</p>
          <span class="preco">R$ 59,90</span>
          <button>Comprar</button>
        </article>

        <!-- Produto 2 -->
        <article class="produto">
          <img src="https://via.placeholder.com/200" alt="Tênis esportivo branco">
          <h3>Tênis Branco</h3>
          <p>Ideal para caminhada e treino.</p>
          <span class="preco">R$ 199,90</span>
          <button>Comprar</button>
        </article>

        <!-- Produto 3 -->
        <article class="produto">
          <img src="https://via.placeholder.com/200" alt="Relógio moderno masculino">
          <h3>Relógio Masculino</h3>
          <p>Design moderno e elegante.</p>
          <span class="preco">R$ 149,90</span>
          <button>Comprar</button>
        </article>

      </div>
    </section>
  </main>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2026 Minha Loja. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
